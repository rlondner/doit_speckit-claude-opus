<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Do It - Edit Goal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface": "#fffaf5",
              "on-surface-variant": "#7a6e65",
              "on-error-container": "#570008",
              "surface-container-lowest": "#ffffff",
              "on-secondary": "#5a4d3f",
              "surface-container-low": "#fff5eb",
              "inverse-surface": "#2a241f",
              "on-tertiary-container": "#644b32",
              "on-primary-fixed": "#4d2910",
              "primary-dim": "#f58d6e",
              "outline-variant": "#d9cdc2",
              "on-tertiary": "#fff0e5",
              "primary-fixed": "#ffd8c4",
              "tertiary-container": "#fef3c7",
              "surface-bright": "#fffaf5",
              "secondary-fixed-dim": "#e6d5c5",
              "secondary-fixed": "#f5e8da",
              "on-primary-container": "#853a1a",
              "tertiary-fixed-dim": "#fcd34d",
              "secondary-dim": "#706357",
              "primary-container": "#ffedd5",
              "surface-tint": "#f07a50",
              "on-tertiary-fixed": "#451a03",
              "surface-container-high": "#f7e7d8",
              "surface-variant": "#f0e1d1",
              "tertiary": "#b45309",
              "on-secondary-fixed": "#453b32",
              "inverse-primary": "#ffd8c4",
              "surface-container": "#fcecdb",
              "on-error": "#fff5f5",
              "primary": "#f07a50",
              "on-secondary-container": "#453b32",
              "background": "#fffaf5",
              "error-container": "#fee2e2",
              "outline": "#b1a498",
              "secondary-container": "#fef3c7",
              "inverse-on-surface": "#a3988f",
              "error-dim": "#9f0519",
              "tertiary-fixed": "#fef3c7",
              "surface-dim": "#f0e1d1",
              "tertiary-dim": "#b45309",
              "error": "#ef4444",
              "on-secondary-fixed-variant": "#6b5d52",
              "on-primary": "#ffffff",
              "on-primary-fixed-variant": "#853a1a",
              "secondary": "#7a6e65",
              "surface-container-highest": "#f0e1d1",
              "on-surface": "#3d352e",
              "primary-fixed-dim": "#f5a782",
              "on-tertiary-fixed-variant": "#92400e",
              "on-background": "#3d352e"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-radiant-primary {
            background: linear-gradient(135deg, #f07a50 0%, #ffb48f 100%);
        }
    </style>
</head>
<body class="bg-background font-body text-on-surface antialiased overflow-hidden">
<!-- DASHBOARD BACKGROUND (DIMMED ORANGE VERSION) -->
<div class="fixed inset-0 flex flex-col overflow-hidden opacity-30 grayscale-[10%] pointer-events-none">
<header class="w-full bg-white border-b border-surface-container font-headline antialiased tracking-tight">
<div class="flex justify-between items-center w-full px-8 py-4 max-w-screen-2xl mx-auto">
<div class="flex items-center gap-8">
<span class="text-2xl font-bold tracking-tighter text-primary">Do It</span>
<nav class="flex gap-6">
<span class="text-primary border-b-2 border-primary pb-1 font-semibold">Dashboard</span>
<span class="text-on-surface-variant font-medium">Analytics</span>
<span class="text-on-surface-variant font-medium">Community</span>
</nav>
</div>
</div>
</header>
<main class="max-w-screen-2xl mx-auto px-8 py-12 w-full">
<div class="mb-16">
<h1 class="font-headline text-4xl font-extrabold tracking-tight mb-2 text-on-surface">Good morning, Alex</h1>
<p class="text-on-surface-variant text-lg">You have <span class="text-primary font-semibold">4 active goals</span> to focus on today.</p>
</div>
<div class="grid grid-cols-12 gap-12">
<div class="col-span-8 space-y-8">
<div class="bg-surface-container-high h-24 rounded-xl"></div>
<div class="bg-surface-container-high h-24 rounded-xl"></div>
<div class="bg-surface-container-high h-24 rounded-xl"></div>
</div>
<div class="col-span-4 bg-surface-container-low rounded-3xl h-[400px]"></div>
</div>
</main>
</div>
<!-- MODAL OVERLAY -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-6">
<!-- Backdrop Blur -->
<div class="absolute inset-0 bg-inverse-surface/10 backdrop-blur-sm"></div>
<!-- Modal Container -->
<div class="relative w-full max-w-lg bg-surface-container-lowest rounded-xl shadow-[0_24px_48px_-12px_rgba(240,122,80,0.15)] overflow-hidden flex flex-col border border-surface-container">
<!-- Modal Header (Orange Gradient) -->
<div class="bg-radiant-primary px-8 pt-10 pb-12 relative overflow-hidden">
<div class="relative z-10">
<h2 class="font-headline text-3xl font-bold tracking-tight text-white mb-2">Refine Your Ambition</h2>
<p class="font-body text-white/90 leading-relaxed">Update your objective and keep your momentum high.</p>
</div>
<!-- Decorative element -->
<div class="absolute -right-8 -bottom-8 w-32 h-32 bg-white/10 rounded-full blur-2xl"></div>
</div>
<!-- Modal Body -->
<div class="p-8 pt-10 space-y-8">
<!-- Input Group: Goal Title -->
<div class="space-y-3">
<label class="font-headline text-sm font-bold tracking-wide text-on-surface-variant uppercase ml-1" for="goal-title">Goal Title</label>
<div class="relative group">
<input class="w-full px-5 py-4 bg-surface-container-low border-none rounded-xl font-body text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 transition-all duration-200" id="goal-title" placeholder="e.g., Master Minimalist UI Design" type="text" value="Finish UI Design System"/>
</div>
</div>
<!-- Two Column Layout for Date and Priority -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Input Group: End Date -->
<div class="space-y-3">
<label class="font-headline text-sm font-bold tracking-wide text-on-surface-variant uppercase ml-1" for="end-date">End Date</label>
<div class="relative">
<input class="w-full px-5 py-4 bg-surface-container-low border-none rounded-xl font-body text-on-surface focus:ring-2 focus:ring-primary/20 transition-all duration-200" id="end-date" type="date" value="2024-03-25"/>
</div>
</div>
<!-- Input Group: Category/Context -->
<div class="space-y-3">
<label class="font-headline text-sm font-bold tracking-wide text-on-surface-variant uppercase ml-1">Focus Area</label>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 rounded-full bg-secondary-container text-on-secondary-container text-xs font-bold hover:bg-secondary transition-colors">Professional</button>
<button class="px-4 py-2 rounded-full bg-primary text-white text-xs font-bold border-2 border-transparent">Personal</button>
</div>
</div>
</div>
<!-- Footer Actions -->
<div class="flex items-center justify-between pt-4">
<button class="text-sm font-headline font-bold text-error hover:text-error-dim transition-colors flex items-center gap-1">
<span class="material-symbols-outlined text-lg">delete</span>
                    Delete Goal
                </button>
<div class="flex items-center gap-4">
<button class="px-6 py-4 font-headline font-bold text-on-surface-variant hover:text-on-surface transition-colors">
                        Cancel
                    </button>
<button class="px-8 py-4 bg-radiant-primary text-white font-headline font-bold rounded-full shadow-[0_12px_24px_-8px_rgba(240,122,80,0.3)] hover:scale-[1.02] active:scale-95 transition-all">
                        Save Changes
                    </button>
</div>
</div>
</div>
<!-- Close Button -->
<div class="absolute top-4 right-4 h-10 w-10 flex items-center justify-center rounded-full bg-white/20 backdrop-blur-md cursor-pointer hover:bg-white/40 transition-colors">
<span class="material-symbols-outlined text-white" data-icon="close">close</span>
</div>
</div>
</div>
</body></html>
